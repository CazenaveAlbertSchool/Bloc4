name: CI/CD — Dandelion vs Grass

on:
  push:
    branches: [main]
    paths:
      - 'projects/dandelion-grass/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'projects/dandelion-grass/**'
      - '.github/workflows/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/dandelion-grass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            projects/dandelion-grass/api/requirements.txt
            projects/dandelion-grass/monitoring/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r monitoring/requirements.txt
          pip install pytest httpx ruff

      - name: Lint (ruff)
        run: ruff check apps/ tests/ --ignore E501

      - name: Run tests
        env:
          DATABASE_URL: ""
          MODEL_PATH: ""
          MODEL_S3_URI: ""
          S3_ENDPOINT_URL: "http://localhost:9000"
        run: pytest tests/ -v --tb=short

  # ── 2. Build & Push Docker Image ────────────────────────────────
  build:
    name: Build & Push API Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mlops-dandelion-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: projects/dandelion-grass/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

