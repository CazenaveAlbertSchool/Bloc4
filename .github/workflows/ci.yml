name: CI/CD — Dandelion vs Grass

on:
  push:
    branches: [main]
    paths:
      - 'projects/dandelion-grass/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'projects/dandelion-grass/**'
      - '.github/workflows/**'

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/dandelion-grass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projects/dandelion-grass/apps/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install pytest httpx ruff

      - name: Lint (ruff)
        run: ruff check apps/ tests/ --ignore E501

      - name: Run tests
        env:
          DATABASE_URL: ""
          MODEL_PATH: ""
          MODEL_S3_URI: ""
          S3_ENDPOINT_URL: "http://localhost:9000"
        run: pytest tests/ -v --tb=short

  # ── 2. Build & Push Docker Image ────────────────────────────────
  build:
    name: Build & Push API Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mlops-dandelion-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: projects/dandelion-grass/apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Kubernetes ──────────────────────────────────────
  deploy:
    name: Deploy to K8s
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    # Requires secret KUBECONFIG_B64 (base64-encoded kubeconfig)

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Patch image tag in manifest
        run: |
          NEW_IMAGE="ghcr.io/${{ github.repository_owner }}/mlops-dandelion-api:${{ needs.build.outputs.image_tag }}"
          sed -i "s|your-dockerhub-user/mlops-api:latest|${NEW_IMAGE}|g" \
            projects/dandelion-grass/infra/k8s/api-deployment.yaml

      - name: Apply K8s manifests
        run: |
          kubectl apply -f projects/dandelion-grass/infra/k8s/namespace.yaml
          kubectl apply -f projects/dandelion-grass/infra/k8s/api-deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/mlops-api \
            --namespace mlops-prod \
            --timeout=120s

      - name: Smoke test deployed API
        run: |
          API_URL=$(kubectl get svc mlops-api -n mlops-prod -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -f "http://${API_URL}/healthz" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"
